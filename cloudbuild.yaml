logging: CLOUD_LOGGING_ONLY
substitutions:
  _REGION: us-central1
  _REPO: katabatak
  _SERVICE: gm-server

steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -f
      - packages/server/Dockerfile
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/gm-server:$COMMIT_SHA
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/gm-server:latest
      - .

  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - --all-tags
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/gm-server

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE}
      - --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/gm-server:$COMMIT_SHA
      - --region=${_REGION}
      - --platform=managed
      - --allow-unauthenticated
      - --min-instances=1
      - --port=8080

images:
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/gm-server:$COMMIT_SHA
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/gm-server:latest
