<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Katabatak — Player Dashboard</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <nav>
    <span class="brand">Katabatak</span>
    <div class="flex">
      <span id="game-name" class="muted"></span>
      <span class="badge badge-player">Player</span>
      <a href="/landing" class="btn btn-ghost btn-sm">← Games</a>
      <button class="btn btn-ghost btn-sm" onclick="logout()">Logout</button>
    </div>
  </nav>

  <div class="page">
    <div class="tabs">
      <div class="tab active" onclick="switchTab('characters')">My Characters</div>
      <div class="tab" onclick="switchTab('skills')">Skill Tree</div>
    </div>

    <!-- Characters tab -->
    <div id="tab-characters" class="tab-panel active">
      <div class="flex mb1">
        <h3>Characters</h3>
        <span class="spacer"></span>
        <button class="btn btn-primary btn-sm" onclick="openCreateChar()">+ New Character</button>
      </div>
      <div id="characters-list" class="card-grid"><p class="muted">Loading…</p></div>

      <!-- Create character form -->
      <div id="create-char-form" class="card mt1" style="display:none; max-width:420px">
        <h3>New Character</h3>
        <div class="field mt1">
          <label>Name</label>
          <input id="char-name" type="text" placeholder="Thalindra Ashwood">
        </div>
        <div class="field">
          <label>Class</label>
          <input id="char-class" type="text" placeholder="Ranger">
        </div>
        <div class="field">
          <label>Notes</label>
          <textarea id="char-notes" rows="3" placeholder="Backstory, quirks…"></textarea>
        </div>
        <div class="flex">
          <button class="btn btn-primary" onclick="createCharacter()">Create</button>
          <button class="btn btn-ghost" onclick="document.getElementById('create-char-form').style.display='none'">Cancel</button>
        </div>
        <p id="char-error" class="error-msg"></p>
      </div>

      <!-- Character detail panel -->
      <div id="char-detail" class="card mt1" style="display:none; max-width:480px">
        <div class="flex mb1">
          <h3 id="detail-name"></h3>
          <span class="spacer"></span>
          <button class="btn btn-danger btn-sm" onclick="deleteCharacter()">Delete</button>
        </div>
        <p><span class="muted">Class:</span> <span id="detail-class">—</span></p>
        <p><span class="muted">Level:</span> <span id="detail-level">1</span></p>
        <p class="mt1"><span class="muted">Notes:</span></p>
        <p id="detail-notes" style="white-space:pre-wrap; font-size:0.9rem"></p>
        <p class="mt1 muted" style="font-size:0.85rem">Unlocked skills: <span id="detail-skills">none</span></p>
      </div>
    </div>

    <!-- Skill tree tab -->
    <div id="tab-skills" class="tab-panel">
      <canvas id="skill-canvas"></canvas>
      <p class="muted mt1" style="font-size:0.8rem">Select a character first, then click an unlocked skill node to unlock it.</p>
      <div class="field mt1" style="max-width:240px">
        <label>Active Character</label>
        <select id="active-char"></select>
      </div>
    </div>
  </div>

  <script src="/js/player-dashboard.js"></script>
</body>
</html>
