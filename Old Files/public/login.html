<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Katabatak — Login</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="form-box">
    <h1>Katabatak</h1>

    <div id="login-section">
      <div class="field">
        <label>Email</label>
        <input id="login-email" type="email" placeholder="you@example.com">
      </div>
      <div class="field">
        <label>Password</label>
        <input id="login-password" type="password" placeholder="••••••••">
      </div>
      <button class="btn btn-primary btn-full" onclick="login()">Enter the World</button>
      <p id="login-error" class="error-msg"></p>
      <p class="toggle-link">No account? <a href="#" onclick="toggle()">Register</a></p>
    </div>

    <div id="register-section" style="display:none">
      <div class="field">
        <label>Username</label>
        <input id="reg-username" type="text" placeholder="Adventurer">
      </div>
      <div class="field">
        <label>Email</label>
        <input id="reg-email" type="email" placeholder="you@example.com">
      </div>
      <div class="field">
        <label>Password</label>
        <input id="reg-password" type="password" placeholder="••••••••">
      </div>
      <button class="btn btn-primary btn-full" onclick="register()">Create Account</button>
      <p id="reg-error" class="error-msg"></p>
      <p class="toggle-link">Have an account? <a href="#" onclick="toggle()">Login</a></p>
    </div>
  </div>

  <script src="/js/login.js"></script>
</body>
</html>
