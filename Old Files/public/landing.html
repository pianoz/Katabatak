<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Katabatak — Your Games</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <nav>
    <span class="brand">Katabatak</span>
    <div class="flex">
      <span id="nav-username" class="muted"></span>
      <button class="btn btn-ghost btn-sm" onclick="logout()">Logout</button>
    </div>
  </nav>

  <div class="page">
    <div class="flex mb1">
      <h2>Your Games</h2>
      <span class="spacer"></span>
      <button class="btn btn-ghost btn-sm" onclick="openJoinModal()">Join Game</button>
      <button class="btn btn-primary btn-sm" onclick="openCreateModal()">+ New Game</button>
    </div>

    <div id="games-list" class="card-grid">
      <p class="muted">Loading…</p>
    </div>
  </div>

  <!-- Create game modal -->
  <div id="create-modal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,.6); display:none; align-items:center; justify-content:center;">
    <div class="card" style="width:360px">
      <h3>New Game</h3>
      <div class="field mt1">
        <label>Name</label>
        <input id="create-name" type="text" placeholder="Campaign name">
      </div>
      <div class="field">
        <label>Description</label>
        <textarea id="create-desc" rows="3" placeholder="Optional…"></textarea>
      </div>
      <div class="flex">
        <button class="btn btn-primary" onclick="createGame()">Create</button>
        <button class="btn btn-ghost" onclick="closeModals()">Cancel</button>
      </div>
      <p id="create-error" class="error-msg"></p>
    </div>
  </div>

  <!-- Join game modal -->
  <div id="join-modal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,.6); align-items:center; justify-content:center;">
    <div class="card" style="width:320px">
      <h3>Join Game</h3>
      <div class="field mt1">
        <label>Invite Code</label>
        <input id="join-code" type="text" placeholder="8-character code" maxlength="8" style="text-transform:uppercase">
      </div>
      <div class="flex">
        <button class="btn btn-primary" onclick="joinGame()">Join</button>
        <button class="btn btn-ghost" onclick="closeModals()">Cancel</button>
      </div>
      <p id="join-error" class="error-msg"></p>
    </div>
  </div>

  <script src="/js/landing.js"></script>
</body>
</html>
